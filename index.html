<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="m-icon.svg" />
    <script>
      (() => {
        const STORAGE_KEY = "theme-preference";
        const root = document.documentElement;
        const storedTheme = window.localStorage.getItem(STORAGE_KEY);
        const themePreference =
          storedTheme === "light" ||
          storedTheme === "dark" ||
          storedTheme === "system"
            ? storedTheme
            : "system";
        const resolvedTheme =
          themePreference === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : themePreference;

        root.dataset.theme = resolvedTheme;
        root.dataset.themePreference = themePreference;
        root.classList.toggle("dark", resolvedTheme === "dark");
        root.style.colorScheme = resolvedTheme;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Reem+Kufi:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1"
    />
    <meta
      name="description"
      content="Mufaddal Calcuttawala is a full-stack developer in Dubai building high-performance, AI-powered SaaS applications with React, Node.js, Nest.js, MongoDB, and AWS."
    />

    <title>MUFADDAL</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
